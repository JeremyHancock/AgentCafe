# AgentCafe — CI/CD Pipeline
# Triggers on push to main: lint → test → deploy to Fly.io
#
# Required GitHub Secrets:
#   FLY_API_TOKEN — from `fly tokens create deploy -x 999999h`

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[wizard]" pylint pytest pytest-asyncio httpx

      - name: Lint
        run: python -m pylint agentcafe/ tests/ --disable=C,R

      - name: Test
        run: python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
