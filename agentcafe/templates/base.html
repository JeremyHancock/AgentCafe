<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <title>{% block title %}AgentCafe{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #22252f;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --text-muted: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --danger: #ef4444;
            --danger-hover: #f87171;
            --success: #22c55e;
            --warning: #f59e0b;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .header .logo span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .container {
            width: 100%;
            max-width: 560px;
            padding: 40px 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-low { background: #064e3b; color: #6ee7b7; }
        .badge-medium { background: #78350f; color: #fcd34d; }
        .badge-high { background: #7f1d1d; color: #fca5a5; }
        .badge-critical { background: #7f1d1d; color: #ef4444; border: 1px solid #ef4444; }

        .scope-list {
            list-style: none;
            margin: 12px 0 20px 0;
        }

        .scope-list li {
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scope-list li::before {
            content: "→";
            color: var(--accent);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text);
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.15s;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover { background: var(--danger-hover); }

        .btn-outline {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { background: var(--surface-hover); }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-row .btn { flex: 1; }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #451a1a;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
        }

        .alert-success {
            background: #052e16;
            border: 1px solid #064e3b;
            color: #6ee7b7;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 24px 0;
        }

        .meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        .consent-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8f9fa;
                --surface: #ffffff;
                --surface-hover: #f1f3f5;
                --border: #dee2e6;
                --text: #1a1a2e;
                --text-muted: #6b7280;
                --accent: #4f46e5;
                --accent-hover: #6366f1;
                --danger: #dc2626;
                --danger-hover: #ef4444;
                --success: #16a34a;
                --warning: #d97706;
            }

            .badge-low { background: #d1fae5; color: #065f46; }
            .badge-medium { background: #fef3c7; color: #92400e; }
            .badge-high { background: #fee2e2; color: #991b1b; }
            .badge-critical { background: #fee2e2; color: #dc2626; border: 1px solid #dc2626; }

            input, select {
                background: #ffffff;
                border-color: #d1d5db;
            }

            .alert-error {
                background: #fef2f2;
                border: 1px solid #fecaca;
                color: #991b1b;
            }

            .alert-success {
                background: #f0fdf4;
                border: 1px solid #bbf7d0;
                color: #166534;
            }

            .scope-list li {
                background: #f8f9fa;
                border-color: #dee2e6;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="header">
        <a href="/" class="logo">☕ AgentCafe</a>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
