{% extends "base.html" %}

{% block title %}Company Sign In — AgentCafe{% endblock %}

{% block content %}
<div class="card">
    <h1>Company Dashboard</h1>
    <p>Sign in to manage your services on AgentCafe.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/services/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required
                   placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   placeholder="Your password">
        </div>

        <button type="submit" class="btn btn-primary">Sign in</button>
    </form>

    <hr class="divider">
    <p class="meta" style="text-align:center; margin-bottom:0;">
        No account? <a href="/services/register" style="color:var(--accent);">Register your company</a>
    </p>
</div>
{% endblock %}
