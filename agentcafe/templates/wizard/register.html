{% extends "base.html" %}

{% block title %}Register Company — AgentCafe{% endblock %}

{% block content %}
<div class="card">
    <h1>Register your company</h1>
    <p>Create an account to publish your API on the AgentCafe Menu.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/services/register">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="form-group">
            <label for="name">Company name</label>
            <input type="text" id="name" name="name" required
                   placeholder="Acme Corp">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required
                   placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   minlength="8" placeholder="At least 8 characters">
        </div>

        <div class="form-group">
            <label for="website">Website <span style="color:var(--text-muted);">(optional)</span></label>
            <input type="url" id="website" name="website"
                   placeholder="https://company.com">
        </div>

        <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <hr class="divider">
    <p class="meta" style="text-align:center; margin-bottom:0;">
        Already have an account? <a href="/login" style="color:var(--accent);">Sign in</a>
    </p>
</div>
{% endblock %}
